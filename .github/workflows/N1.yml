name: Build OpenWRT-LEAN for N1

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: N1-LEDE/.config
  DIY_SH: N1-LEDE/diy.sh
  FILES: N1-LEDE/files
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 1
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Checkout
      uses: actions/checkout@main

    - name: Setup Compilation Environment
      run: |
        # 1. 重定向临时目录
        sudo mkdir -p ${{ github.workspace }}/tmp
        sudo chmod 1777 ${{ github.workspace }}/tmp
        echo "TMPDIR=${{ github.workspace }}/tmp" >> $GITHUB_ENV
        
        # 2. 迁移 Docker 目录（修正版）
        sudo systemctl stop docker
        sudo mkdir -p ${{ github.workspace }}/docker
        
        # 如果文件不存在，则直接写入新配置；如果存在，则用 jq 合并
        if [ ! -f /etc/docker/daemon.json ]; then
          echo '{"data-root": "${{ github.workspace }}/docker"}' | sudo tee /etc/docker/daemon.json
        else
          sudo jq '. + {"data-root": "${{ github.workspace }}/docker"}' /etc/docker/daemon.json > /tmp/docker.json
          sudo mv /tmp/docker.json /etc/docker/daemon.json
        fi
        
        sudo systemctl start docker
        
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$(id -gn) $GITHUB_WORKSPACE


    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get update -qq
        # 使用 apt-get 避免 CLI 警告
        sudo -E apt-get -y install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -y install libfuse-dev rename time gn
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get clean

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom config & Disable Node.js
      run: |
        [ -e $FILES ] && mv $FILES openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_SH
        
        # 关键修正：强制禁用 Node.js 及其所有相关插件，释放空间和CPU压力
        sed -i 's/CONFIG_PACKAGE_node=y/# CONFIG_PACKAGE_node is not set/' .config
        sed -i 's/CONFIG_PACKAGE_node-.*=y/# CONFIG_PACKAGE_node-.* is not set/' .config
        sed -i '/node/d' .config # 进一步清理包含 node 的行
        
        # 重新应用 defconfig 以确保配置一致性
        make defconfig

    - name: Download package
      working-directory: ./openwrt
      run: |
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      working-directory: ./openwrt
      run: |
        echo -e "$(nproc) thread compile"
        # 记录编译耗时
        time make -j$(nproc) || time make -j1 V=s
        echo "compile_status=success" >> $GITHUB_ENV

    - name: Package OpenWrt Firmware
      if: env.compile_status == 'success' && !cancelled()
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_ARMVIRT: openwrt/bin/targets/*/*/openwrt-amlogic-mesongx-phicomm_n1-rootfs.tar.gz
        KERNEL_REPO_URL: breakings/OpenWrt
        KERNEL_VERSION_NAME: 5.15.148
        KERNEL_AUTO_LATEST: false
        PACKAGE_SOC: s905d
        WHOAMI: fightroad
        SW_FLOWOFFLOAD: 1
        SFE_FLOW: 0
       
    - name: Upload OpenWrt Firmware to Release
      uses: ncipollo/release-action@main
      if: env.PACKAGED_STATUS == 'success' && !cancelled()
      with:
        tag: OpenWrt_N1_${{ env.PACKAGED_OUTPUTDATE }}
        artifacts: /opt/openwrt_packit/output/*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          基于 Lean OpenWrt 构建 (N1)
          内核版本: 5.15.148 (breakings)
          默认 IP: 192.168.2.2 / password
        
    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.PACKAGED_STATUS == 'success' && !cancelled()
      with:
        keep_latest: 10
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
