name: Build OpenWRT-LEAN for N1

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: N1-LEDE/.config
  DIY_SH: N1-LEDE/diy.sh
  FILES: N1-LEDE/files
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 1
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Checkout
      uses: actions/checkout@main

    - name: Setup Compilation Environment
      run: |
        # 1. 彻底解决根目录空间不足：将系统级临时目录链接到大分区
        sudo mkdir -p ${{ github.workspace }}/tmp
        sudo chmod 1777 ${{ github.workspace }}/tmp
        # 使用软链接替代环境变量，确保所有底层工具都写到大分区
        sudo rm -rf /tmp
        sudo ln -s ${{ github.workspace }}/tmp /tmp
        
        # 2. 迁移 Docker 目录（跳过配置读取，直接强制覆盖）
        sudo systemctl stop docker
        sudo mkdir -p ${{ github.workspace }}/docker
        # 直接创建新配置，避免使用 jq 读取可能不存在的文件
        echo '{"data-root": "${{ github.workspace }}/docker"}' | sudo tee /etc/docker/daemon.json
        sudo systemctl start docker
        
        # 3. 设置时区与权限
        sudo timedatectl set-timezone "$TZ"
        sudo chown $USER:$(id -gn) $GITHUB_WORKSPACE
        
        echo "Check Space again:"
        df -hT


    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get update -qq
        # 使用 apt-get 避免 CLI 警告
        sudo -E apt-get -y install $(curl -fsSL https://is.gd/depends_ubuntu_2204)
        sudo -E apt-get -y install libfuse-dev rename time gn
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get clean

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom config & Disable Node.js
      run: |
        # 1. 移动自定义文件和配置文件
        [ -e $FILES ] && mv $FILES openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_SH
        
        cd openwrt
        # 执行你的 DIY 脚本
        $GITHUB_WORKSPACE/$DIY_SH
        
        # 2. 第一次补全配置：将你的 .config 扩展为完整的配置列表
        make defconfig
        
        # 3. 关键修正：深度剔除 Node.js 及其关联插件
        # 禁用主程序并删除所有包含 node 的配置行（忽略大小写）
        sed -i '/[Nn][Oo][Dd][Ee]/d' .config
        
        # 显式添加禁用声明，防止被依赖自动勾选
        echo "CONFIG_PACKAGE_node=n" >> .config
        echo "CONFIG_PACKAGE_node-npm=n" >> .config
        
        # 4. 第二次补全配置：刷新依赖关系，确保 Node.js 相关的插件也被自动取消
        make defconfig


    - name: Download package
      working-directory: ./openwrt
      run: |
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      working-directory: ./openwrt
      run: |
        echo -e "$(nproc) thread compile"
        # 记录编译耗时
        time make -j$(nproc) || time make -j1 V=s
        echo "compile_status=success" >> $GITHUB_ENV

    - name: Package OpenWrt Firmware
      if: env.compile_status == 'success' && !cancelled()
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_ARMVIRT: openwrt/bin/targets/*/*/openwrt-amlogic-mesongx-phicomm_n1-rootfs.tar.gz
        KERNEL_REPO_URL: breakings/OpenWrt
        KERNEL_VERSION_NAME: 5.15.148
        KERNEL_AUTO_LATEST: false
        PACKAGE_SOC: s905d
        WHOAMI: fightroad
        SW_FLOWOFFLOAD: 1
        SFE_FLOW: 0
       
    - name: Upload OpenWrt Firmware to Release
      uses: ncipollo/release-action@main
      if: env.PACKAGED_STATUS == 'success' && !cancelled()
      with:
        tag: OpenWrt_N1_${{ env.PACKAGED_OUTPUTDATE }}
        artifacts: /opt/openwrt_packit/output/*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          基于 Lean OpenWrt 构建 (N1)
          内核版本: 5.15.148 (breakings)
          默认 IP: 192.168.2.2 / password
        
    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.PACKAGED_STATUS == 'success' && !cancelled()
      with:
        keep_latest: 10
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
