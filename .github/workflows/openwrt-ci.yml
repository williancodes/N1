name: Build OpenWRT-LEAN for N1

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: 20230609
  CONFIG_FILE: N1-LEDE/.config
  DIY_SH: N1-LEDE/diy.sh
  FILES: N1-LEDE/files
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Free Disk Space (Manual Clean)
      run: |
        # 手动删除根目录下不需要的巨型文件夹，为系统分区腾出空间
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/lib/jvm
        sudo docker image prune -a -f
        # 此时根目录应该有 20-30GB 空间了，足够编译
        df -hT

    - name: Checkout
      uses: actions/checkout@main

    - name: Setup Compilation Environment
      run: |
        sudo timedatectl set-timezone "$TZ"
        # 确保工作目录权限正确
        sudo chown $USER:$(id -gn) $GITHUB_WORKSPACE
        # 将一些缓存目录软链接到当前目录，减少根目录压力
        mkdir -p ${{ github.workspace }}/.ccache
        ln -s ${{ github.workspace }}/.ccache ~/.ccache

    - name: Initialize environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get update -qq
        # 修正后的 Lean 源码编译标准依赖脚本 (针对 Ubuntu 22.04)
        sudo -E apt-get -y install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools swig zlib1g-dev apktool antlr3 gperf wget curl rename
        sudo -E apt-get -y install libfuse-dev time gn
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get clean


    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt

    - name: Update & Install feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom config & Disable Node.js
      run: |
        # 1. 移动自定义文件
        [ -e $FILES ] && mv $FILES openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        
        # 2. 执行 DIY 脚本
        chmod +x $DIY_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_SH
        
        # 3. 补全配置并强制剔除 Node.js
        make defconfig
        
        # 深度剔除 Node.js
        sed -i '/[Nn][Oo][Dd][Ee]/d' .config
        echo "CONFIG_PACKAGE_node=n" >> .config
        echo "CONFIG_PACKAGE_node-npm=n" >> .config
        
        # 4. 第二次补全，强制刷新我们的精简依赖树
        make defconfig


    - name: Download package
      working-directory: ./openwrt
      run: |
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      working-directory: ./openwrt
      run: |
        echo -e "$(nproc) thread compile"
        # 记录编译耗时
        time make -j$(nproc) || time make -j1 V=s
        echo "compile_status=success" >> $GITHUB_ENV

    - name: Package OpenWrt Firmware
      if: env.compile_status == 'success' && !cancelled()
      uses: unifreq/openwrt_packit@master
      env:
        OPENWRT_ARMVIRT: openwrt/bin/targets/*/*/openwrt-amlogic-mesongx-phicomm_n1-rootfs.tar.gz
        KERNEL_REPO_URL: breakings/OpenWrt
        KERNEL_VERSION_NAME: 5.15.148
        KERNEL_AUTO_LATEST: false
        PACKAGE_SOC: s905d
        WHOAMI: fightroad
        SW_FLOWOFFLOAD: 1
        SFE_FLOW: 0
       
    - name: Upload OpenWrt Firmware to Release
      uses: ncipollo/release-action@main
      if: env.PACKAGED_STATUS == 'success' && !cancelled()
      with:
        tag: OpenWrt_N1_${{ env.PACKAGED_OUTPUTDATE }}
        artifacts: /opt/openwrt_packit/output/*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          基于 Lean OpenWrt 构建 (N1)
          内核版本: 5.15.148 (breakings)
          默认 IP: 10.10.0.2 / password
        
    - name: Delete old releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.PACKAGED_STATUS == 'success' && !cancelled()
      with:
        keep_latest: 10
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
